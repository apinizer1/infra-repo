apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "multi-env.fullname" . }}
  labels: {{- include "multi-env.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{- include "multi-env.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "multi-env.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            - name: APP_VERSION
              value: {{ .Values.image.tag | quote }}   # /info version = deploy edilen tag
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          readinessProbe:
            httpGet: { path: {{ .Values.probes.path }}, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: {{ .Values.probes.path }}, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources: {{- toYaml .Values.resources | nindent 12 }}