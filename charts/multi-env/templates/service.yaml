apiVersion: v1
kind: Service
metadata:
  name: {{ include "multi-env.fullname" . }}
  labels: {{- include "multi-env.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector: {{- include "multi-env.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      {{- if and (eq .Values.service.type "NodePort") .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}